<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HelpHub AI · Notifications</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }

    body {
      background: linear-gradient(120deg, #edf2f7, #f8f5f0);
      color: #1f2937;
      padding: 20px 20px 40px;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* ----- Navigation (glassmorphic, matches existing) ----- */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px;
      margin-bottom: 30px;
      background: rgba(248, 246, 240, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      position: sticky;
      top: 20px;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #477c6a, #07b07b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 15px;
      color: #111827;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      color: #4b5563;
      font-weight: 500;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 30px;
    }

    .nav-links a.active {
      background: #d1fae5;
      color: #065f46;
    }

    .nav-links a:hover {
      background: #e5e7eb;
    }

    #userChip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      padding: 5px 12px 5px 8px;
      border-radius: 40px;
      margin-left: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .user-avatar-small {
      width: 28px;
      height: 28px;
      background: #0f766e;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 12px;
    }

    #logoutBtn {
      background: none;
      border: 1px solid #e5e7eb;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      margin-left: 5px;
      color: #4b5563;
    }

    #logoutBtn:hover {
      background: #fee2e2;
      border-color: #f87171;
      color: #b91c1c;
    }

    /* ----- Hero (matching AI Center style) ----- */
    .hero {
      background: linear-gradient(135deg, #1f2a2e, #2b3a3f);
      padding: 45px 45px;
      border-radius: 32px;
      color: #f9fafb;
      margin-bottom: 30px;
    }

    .hero small {
      font-size: 12px;
      letter-spacing: 2px;
      color: #9ca3af;
      text-transform: uppercase;
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 600;
      line-height: 1.2;
      margin: 15px 0 10px;
    }

    .hero p {
      color: #9ca3af;
      font-size: 15px;
    }

    /* ----- Notification Controls ----- */
    .notif-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .unread-badge {
      background: #0f766e;
      color: white;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
    }

    .btn-mark-all {
      background: white;
      border: 1px solid #e2e8f0;
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      color: #1f2937;
      cursor: pointer;
    }

    .btn-mark-all:hover {
      background: #d1fae5;
      border-color: #0f766e;
    }

    /* ----- Notification Cards ----- */
    .notification-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .notification-card {
      background: #f8f7f4;
      border-radius: 20px;
      padding: 20px 24px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
      border: 1px solid #f1f1f1;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: all 0.2s;
      position: relative;
    }

    .notification-card.unread {
      background: #ffffff;
      border-left: 5px solid #0f766e;
      box-shadow: 0 8px 20px rgba(7, 176, 123, 0.06);
    }

    .notif-icon {
      width: 44px;
      height: 44px;
      background: #e6f4ea;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f766e;
      font-size: 20px;
      flex-shrink: 0;
    }

    .notif-content {
      flex: 1;
    }

    .notif-header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-bottom: 6px;
    }

    .notif-title {
      font-weight: 650;
      font-size: 16px;
      color: #111827;
    }

    .notif-tag {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 30px;
      font-weight: 500;
      background: #e9f3f1;
      color: #1a535c;
    }

    .notif-tag.urgent {
      background: #fee2e2;
      color: #b91c1c;
    }

    .notif-tag.system {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .notif-message {
      color: #4b5563;
      font-size: 14px;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .notif-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #6b7280;
    }

    .notif-time {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .notif-actions {
      display: flex;
      gap: 12px;
    }

    .notif-actions button {
      background: none;
      border: none;
      color: #6b7280;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 20px;
    }

    .notif-actions button:hover {
      background: #e5e7eb;
      color: #111827;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: #f8f7f4;
      border-radius: 28px;
      color: #6b7280;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .navbar {
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
      }
      .nav-links {
        justify-content: center;
      }
      .hero {
        padding: 30px 20px;
      }
      .hero h1 {
        font-size: 30px;
      }
      .notification-card {
        flex-direction: column;
        align-items: flex-start;
      }
      .notif-footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      .notif-actions {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Navigation Bar (same as dashboard) -->
  <nav class="navbar">
    <div class="logo">
      <div class="logo-icon">H</div>
      <span class="logo-text">HelpHub AI</span>
    </div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="explore.html">Explore</a>
      <a href="leader.html">Leaderboard</a>
      <a href="AI Center.html">AI Center</a>
      <a href="notifications.html" class="active">Notifications</a>
      <div id="userChip">
        <span class="user-avatar-small" id="userInitials">AK</span>
        <span id="userNameDisplay">Ayesha</span>
      </div>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <small>NOTIFICATIONS</small>
    <h1>Stay in the loop.</h1>
    <p>Updates on requests, helper activity, and community milestones — all in one place.</p>
  </section>

  <!-- Toolbar & Notifications -->
  <div class="notif-toolbar">
    <span class="unread-badge" id="unreadCount">0 unread</span>
    <button class="btn-mark-all" id="markAllReadBtn">✓ Mark all as read</button>
  </div>

  <div id="notificationContainer" class="notification-list">
    <!-- Dynamically populated by JavaScript -->
  </div>
</div>

<script>
  (function() {
    // ---------- LOCALSTORAGE SETUP ----------
    const STORAGE_KEY = 'helphub_notifications';
    const USER_KEY = 'helphub_user';

    // Default mock notifications (like real platform)
    const defaultNotifications = [
      {
        id: 'n1',
        title: 'Murtaza Ahmed responded to your request',
        message: '“I can help with the portfolio responsiveness. Share your repo link.”',
        category: 'Web Development',
        urgency: 'normal',
        time: '25 minutes ago',
        read: false,
        icon: '💬',
        type: 'response'
      },
      {
        id: 'n2',
        title: 'Your request is trending',
        message: '“Need help making my portfolio responsive” has 3 interested helpers.',
        category: 'Request Update',
        urgency: 'normal',
        time: '2 hours ago',
        read: false,
        icon: '📈',
        type: 'system'
      },
      {
        id: 'n3',
        title: 'New high‑urgency request in Web Dev',
        message: '“JavaScript quiz app debugging” – deadline in 6 hours.',
        category: 'Urgent',
        urgency: 'high',
        time: '4 hours ago',
        read: true,
        icon: '⚠️',
        type: 'alert'
      },
      {
        id: 'n4',
        title: 'Sara Noor mentioned you in a comment',
        message: '“@Ayesha, could you review the Figma feedback thread?”',
        category: 'Mention',
        urgency: 'normal',
        time: 'Yesterday',
        read: true,
        icon: '👤',
        type: 'mention'
      },
      {
        id: 'n5',
        title: 'You earned a new badge: “Top Helper”',
        message: 'You’re now in the top 10% of helpers this month. Keep it up!',
        category: 'Achievement',
        urgency: 'normal',
        time: '2 days ago',
        read: false,
        icon: '🏅',
        type: 'badge'
      }
    ];

    // Load or initialize notifications
    function loadNotifications() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          return JSON.parse(stored);
        } catch (e) {
          return defaultNotifications;
        }
      } else {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultNotifications));
        return defaultNotifications;
      }
    }

    function saveNotifications(notifs) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notifs));
    }

    let notifications = loadNotifications();

    // ---------- USER INFO (for navbar) ----------
    function getUser() {
      const stored = localStorage.getItem(USER_KEY);
      if (stored) {
        try { return JSON.parse(stored); } catch(e) { return null; }
      }
      // fallback demo user
      return { name: 'Ayesha Khan', initials: 'AK' };
    }

    const user = getUser();
    document.getElementById('userNameDisplay').textContent = user.name ? user.name.split(' ')[0] : 'User';
    document.getElementById('userInitials').textContent = user.initials || (user.name ? user.name.charAt(0).toUpperCase() : 'U');

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.removeItem(USER_KEY);
      window.location.href = 'signup.html';
    });

    // ---------- RENDER NOTIFICATIONS ----------
    const container = document.getElementById('notificationContainer');
    const unreadSpan = document.getElementById('unreadCount');

    function renderNotifications() {
      const activeNotifications = notifications.filter(n => !n.deleted); // soft delete support
      if (activeNotifications.length === 0) {
        container.innerHTML = `<div class="empty-state">
          <i class="bi bi-bell-slash" style="font-size: 32px; opacity: 0.5; margin-bottom: 16px; display: block;"></i>
          <h3 style="font-weight: 500;">All caught up!</h3>
          <p style="margin-top: 8px;">No new notifications.</p>
        </div>`;
        unreadSpan.textContent = `0 unread`;
        return;
      }

      let html = '';
      let unreadCount = 0;

      activeNotifications.sort((a, b) => (a.read === b.read) ? 0 : a.read ? 1 : -1); // unread first

      activeNotifications.forEach(notif => {
        if (!notif.read) unreadCount++;
        const readClass = notif.read ? '' : 'unread';
        const urgencyClass = notif.urgency === 'high' ? 'urgent' : (notif.type === 'system' ? 'system' : '');
        
        html += `
          <div class="notification-card ${readClass}" data-id="${notif.id}">
            <div class="notif-icon">${notif.icon || '🔔'}</div>
            <div class="notif-content">
              <div class="notif-header">
                <span class="notif-title">${notif.title}</span>
                <span class="notif-tag ${urgencyClass}">${notif.category}</span>
              </div>
              <div class="notif-message">${notif.message}</div>
              <div class="notif-footer">
                <span class="notif-time"><i class="bi bi-clock"></i> ${notif.time}</span>
                <div class="notif-actions">
                  ${!notif.read ? `<button class="mark-read-btn" data-id="${notif.id}"><i class="bi bi-check2-circle"></i> Mark read</button>` : ''}
                  <button class="delete-btn" data-id="${notif.id}"><i class="bi bi-trash3"></i> Delete</button>
                </div>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      unreadSpan.textContent = `${unreadCount} unread`;

      // Attach event listeners to buttons
      document.querySelectorAll('.mark-read-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          markAsRead(id);
        });
      });

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          deleteNotification(id);
        });
      });
    }

    function markAsRead(id) {
      const notif = notifications.find(n => n.id === id);
      if (notif) {
        notif.read = true;
        saveNotifications(notifications);
        renderNotifications();
      }
    }

    function markAllAsRead() {
      notifications.forEach(n => { n.read = true; });
      saveNotifications(notifications);
      renderNotifications();
    }

    function deleteNotification(id) {
      const index = notifications.findIndex(n => n.id === id);
      if (index !== -1) {
        notifications.splice(index, 1); // permanent delete
        saveNotifications(notifications);
        renderNotifications();
      }
    }

    // Mark all as read button
    document.getElementById('markAllReadBtn').addEventListener('click', markAllAsRead);

    // Initial render
    renderNotifications();

    // (Optional) simulate real-time: you could add a "new notification" after timeout, but not necessary.
  })();
</script>
</body>
</html>
